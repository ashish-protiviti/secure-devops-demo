name: dependency-review

on:
  pull_request:
    branches: [main]

jobs:
  dependency-review:
    name: dependency-review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate